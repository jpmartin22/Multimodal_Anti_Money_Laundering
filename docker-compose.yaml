version: '3.8'

services:
  multimodal_anti_money_laundering:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    container_name: multimodal_anti_money_laundering_app
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"

  api:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    container_name: aml_api
    command: >
      uvicorn multimodal_anti_money_laundering.serving.api:app
      --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8001:8000"

  prometheus:
    image: prom/prometheus:latest
    container_name: aml_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: aml_grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=aml_admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
