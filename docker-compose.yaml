# Load shared environment from .env (copy .env.example → .env to get started)
# Each service can selectively override individual variables inline.

services:

  # ── Training job ─────────────────────────────────────────────────────────────
  train:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    container_name: aml_train
    command: python -m multimodal_anti_money_laundering.train_model
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1

  # ── Inference API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    container_name: aml_api
    command: >
      uvicorn multimodal_anti_money_laundering.serving.api:app
      --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Prometheus metrics scraper ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: aml_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy

  # ── Grafana dashboard ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: aml_grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-aml_admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
